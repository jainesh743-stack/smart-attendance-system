<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <style>body{min-height:100vh;display:flex;align-items:center;background:var(--bg)}</style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="auth-card">
        <div class="auth-logo purple"><i class="bi bi-shield-lock-fill"></i></div>
        <h3 class="auth-title">Admin Panel</h3>
        <p class="auth-sub">Smart Attendance System</p>

        {% if error %}
        <div class="alert-box error mb-3"><i class="bi bi-x-circle me-2"></i>{{ error }}</div>
        {% endif %}

        <form method="POST" action="/admin/login">
          <div class="field-group">
            <label>Username</label>
            <div class="input-icon-wrap">
              <i class="bi bi-person-fill"></i>
              <input type="text" name="username" class="form-input" placeholder="admin" required autofocus/>
            </div>
          </div>
          <div class="field-group">
            <label>Password</label>
            <div class="input-icon-wrap">
              <i class="bi bi-lock-fill"></i>
              <input type="password" name="password" class="form-input" placeholder="••••••••" required/>
            </div>
          </div>
          <button type="submit" class="btn-submit w-100 mt-2">
            <i class="bi bi-box-arrow-in-right me-2"></i>Login to Admin
          </button>
        </form>

        <div class="auth-links">
          <a href="/"><i class="bi bi-arrow-left me-1"></i>Back to Home</a>
        </div>

        <div class="hint-box mt-3">
          <i class="bi bi-info-circle me-1"></i>Default: admin / admin123
        </div>
      </div>
    </div>
  </div>
</div>
<script>
// Theme persistence
const t = localStorage.getItem("theme")||"light";
document.documentElement.setAttribute("data-theme",t);
</script>
</body>
</html>
