<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Smart Attendance{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  {% block extra_head %}{% endblock %}
</head>
<body>

<!-- Navbar -->
<nav class="main-navbar">
  <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
    <a href="/" class="brand-link">
      <div class="brand-icon"><i class="bi bi-eye-fill"></i></div>
      <div>
        <div class="brand-name">SmartAttend</div>
        <div class="brand-sub">AI Attendance System</div>
      </div>
    </a>

    <div class="nav-actions">
      <!-- Dark/Light Toggle -->
      <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">
        <i class="bi bi-sun-fill" id="themeIcon"></i>
      </button>

      <!-- Nav links -->
      <a href="/" class="nav-pill {% if request.path=='/' %}active{% endif %}">
        <i class="bi bi-house-fill"></i><span>Home</span>
      </a>
      <a href="/register" class="nav-pill {% if request.path=='/register' %}active{% endif %}">
        <i class="bi bi-person-plus-fill"></i><span>Register</span>
      </a>
      <a href="/student/login" class="nav-pill {% if 'student' in request.path %}active{% endif %}">
        <i class="bi bi-person-fill"></i><span>Student</span>
      </a>
      <a href="/admin" class="nav-pill admin-pill">
        <i class="bi bi-shield-lock-fill"></i><span>Admin</span>
      </a>
    </div>
  </div>
</nav>

<main>{% block content %}{% endblock %}</main>

<footer class="main-footer">
  <div class="container text-center">
    <span><i class="bi bi-mortarboard-fill me-1"></i>Smart Attendance System — BCA Final Year Project 2024</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
